<h1 style="text-align:center;">Admin Dashboard</h1>

<section class="admin-section">

<h2>Add New Event</h2>

<form id="eventForm" enctype="multipart/form-data">

<div class="form-group">
  <label>Event Title</label>
  <input type="text" id="title" name="title" placeholder="Event Title" required>
</div>

<div class="form-group">
  <label>Date</label>
  <input type="date" id="date" name="date" required>
</div>

<div class="form-group">
  <label>Description</label>
  <textarea id="description" name="description" placeholder="Event Description" required></textarea>
</div>

<div class="form-group">
  <label>Upload Image</label>
  <input type="file" id="image" name="image" accept="image/*">
</div>

<button type="submit">Add Event</button>

</form>

<p id="statusMessage"></p>

</section>

<script>

document.getElementById("eventForm").addEventListener("submit", async function(e){

e.preventDefault();

const formData = new FormData();

formData.append("title", document.getElementById("title").value);
formData.append("date", document.getElementById("date").vue);
formData.append("description", document.getElementById("description").value);

const file = document.getElementById("image").files[0];
if(file){
  formData.append("image", file);
}

try {

const res = await fetch("http://localhost:5000/api/events", {
  method: "POST",
  body: formData
});

const data = await res.json();

if(res.ok){
  document.getElementById("statusMessage").textContent = "✅ Event added successfully!";
} else {
  document.getElementById("statusMessage").textContent = "❌ " + data.message;
}

document.getElementById("eventForm").reset();

} catch (error) {

console.error(error);
document.getElementById("statusMessage").textContent = "❌ Server error";

}

});

</script>

</body>
